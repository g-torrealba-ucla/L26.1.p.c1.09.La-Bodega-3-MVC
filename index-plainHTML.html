<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bodega - HTML Plano</title>
</head>
<body>

  <section id="body">
    <h2>Gestión de Bodega (HTML Plano)</h2>
    <button id="body_btNuevoArticulo">Nuevo artículo</button>
    <hr>
    <div>
      La ganancia será de Bs. <span id="body_lblGanancia">0</span>
    </div>
  </section>

  <section id="articulo" hidden style="margin-top: 20px; border: 1px solid #ccc; padding: 15px; width: 300px;">
    <h5 id="articulo_lblArticulo">Procesar Artículo</h5>
    <label>Costo:
      <input type="number" id="articulo_inCosto" placeholder="Ej: 100">
    </label>
    <br><br>
    <button id="articulo_btCancelar">Cancelar</button>
    <button id="articulo_btAceptar">Aceptar</button>
  </section>

  <script type="module">
    import Cl_cBodega from "./dist/controllers/Cl_cBodega.js";
    import Cl_cArticulo from "./dist/controllers/Cl_cArticulo.js";
    
    // Importamos SOLO las vistas planas
    import Cl_vBodegaPlain from "./dist/views/Cl_vBodegaPlain.js";
    import Cl_vArticuloPlain from "./dist/views/Cl_vArticuloPlain.js";

    // 1. Instanciamos las vistas
    const vistaBodega = new Cl_vBodegaPlain();
    const vistaArticulo = new Cl_vArticuloPlain();

    // 2. Inyectamos las vistas en los controladores (¡La magia ocurre aquí!)
    const controladorArticulo = new Cl_cArticulo(vistaArticulo);
    new Cl_cBodega(vistaBodega, controladorArticulo);
  </script>
</body>
</html>
