<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Document</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>
  <script type="module">
    import cBodega from "./dist/controllers/Cl_cBodega.js";
    new cBodega();
  </script>

  <div class="container mt-5">
    <h2>Gestión de Bodega</h2>

    <button type="button" class="btn btn-primary" id="body_btNuevoArticulo">
      Nuevo artículo
    </button>

    <hr>

    <div id="resultado" class="alert alert-info">
      La ganancia será de Bs. <span id="body_lblGanancia" class="fw-bold">0</span>
    </div>
  </div>

  <div class="modal fade" id="articulo" tabindex="-1" aria-labelledby="articulo_lblArticulo" aria-hidden="true">
    <div class="modal-dialog">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title" id="articulo_lblArticulo">Procesar Artículo</h5>
        </div>
        <div class="modal-body">
          <div class="mb-3">
            <label for="body_inCosto" class="form-label">Costo:</label>
            <input type="number" class="form-control" id="articulo_inCosto" placeholder="Ej: 100">
          </div>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-secondary" id="articulo_btCancelar">Cancelar</button>
          <button type="button" id="articulo_btAceptar" class="btn btn-success">Aceptar</button>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
