<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bodega - Bootstrap</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

  <div id="app-bootstrap" class="container mt-5">
    <h2>Gestión de Bodega (Bootstrap)</h2>
    <button type="button" class="btn btn-primary" id="body_btNuevoArticulo">Nuevo artículo</button>
    <hr>
    <div class="alert alert-info">
      La ganancia será de Bs. <span id="body_lblGanancia" class="fw-bold">0</span>
    </div>
  </div>

  <div class="modal fade" id="articulo" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title">Procesar Artículo</h5>
        </div>
        <div class="modal-body">
          <label class="form-label">Costo:</label>
          <input type="number" class="form-control" id="articulo_inCosto">
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-secondary" id="articulo_btCancelar">Cancelar</button>
          <button type="button" class="btn btn-success" id="articulo_btAceptar">Aceptar</button>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

  <script type="module">
    import Cl_cBodega from "./dist/controllers/Cl_cBodega.js";
    import Cl_cArticulo from "./dist/controllers/Cl_cArticulo.js";
    
    // Importamos SOLO las vistas de Bootstrap
    import Cl_vBodegaBootstrap from "./dist/views/Cl_vBodegaBootstrap.js";
    import Cl_vArticuloBootstrap from "./dist/views/Cl_vArticuloBootstrap.js";

    // 1. Instanciamos las vistas
    const vistaBodega = new Cl_vBodegaBootstrap();
    const vistaArticulo = new Cl_vArticuloBootstrap();

    // 2. Inyectamos las vistas en los mismos controladores
    const controladorArticulo = new Cl_cArticulo(vistaArticulo);
    new Cl_cBodega(vistaBodega, controladorArticulo);
  </script>
</body>
</html>
