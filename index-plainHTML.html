<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Document</title>
</head>

<body>
  <script type="module">
    import cBodega from "./dist/controllers/Cl_cBodega.js";
    new cBodega();
  </script>

  <section id="body">
    <div class="container mt-5">
      <h2>Gestión de Bodega</h2>

      <button type="button" class="btn btn-primary" id="body_btNuevoArticulo">
        Nuevo artículo
      </button>

      <hr>

      <div>
        La ganancia será de Bs. <span id="body_lblGanancia" class="fw-bold">0</span>
      </div>
    </div>
  </section>

  <section id="articulo" hidden>
    <div>
      <h5 id="articulo_lblArticulo">Procesar Artículo</h5>
    </div>
    <div>
      <label>Costo:
        <input type="number" class="form-control" id="articulo_inCosto" placeholder="Ej: 100">
      </label>
    </div>
    <div>
      <button id="articulo_btCancelar">Cancelar</button>
      <button id="articulo_btAceptar">Aceptar</button>
    </div>
  </section>

</body>

</html>
